
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:0 0 2rem}
.topbar{background:#fff;padding:16px 20px 14px;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--border)}
.topbar img{height:36px;display:block}
.topbar-info{text-align:right}
.topbar-info .title{font-size:14px;font-weight:500;color:var(--text-primary);display:block;margin-bottom:2px}
.topbar-info .sub{font-size:11px;color:var(--text-secondary)}
.topbar-info .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;margin-left:4px}
.badge-pre{background:#fef3e2;color:#92400e}
.badge-pos{background:#dcfce7;color:#166534}
.divider{height:3px;background:linear-gradient(90deg,#e8303a,#e860a0,#9b35c6,#4f6dee,#28cce8,#2bc96e,#84c81e);margin-bottom:1.5rem}
.nav{display:flex;margin-bottom:1.5rem;border-bottom:1.5px solid #e8eaf6}
.nav button{background:none;border:none;border-bottom:2px solid transparent;padding:8px 15px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-bottom:-2px;transition:all 0.12s;border-radius:4px 4px 0 0}
.nav button.active{color:#4f6dee;border-bottom-color:#4f6dee;background:#f0f2fd;font-weight:500}
.nav button:hover:not(.active){color:var(--text-primary);background:var(--surface-1)}
.section{display:none}.section.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--surface-2);border:0.5px solid var(--border);border-radius:8px;padding:13px 15px;border-top:3px solid #4f6dee}
.kpi.k2{border-top-color:#2bc96e}.kpi.k3{border-top-color:#9b35c6}.kpi.k4{border-top-color:#28cce8}
.kpi-label{font-size:10px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em}
.kpi-value{font-size:20px;font-weight:500;color:var(--text-primary);line-height:1.1}
.kpi-delta{font-size:11px;margin-top:4px;color:var(--text-muted)}
.du{color:#15803d}.dd{color:#b91c1c}
.notice{border-radius:7px;padding:9px 13px;font-size:12px;line-height:1.5;margin-bottom:1rem;display:flex;gap:8px;align-items:flex-start}
.nw{background:#fffbeb;border:0.5px solid #f59e0b;color:#78350f}
.ni{background:#eff6ff;border:0.5px solid #3b82f6;color:#1e40af}
.notice i{font-size:15px;flex-shrink:0;margin-top:1px}
.card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem;margin-bottom:.9rem}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--text-muted);margin-bottom:.8rem}
.leg{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
@media(max-width:560px){.g2{grid-template-columns:1fr}}
.fact{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;background:var(--surface-1);border-radius:7px;font-size:12px;line-height:1.4;border-left:3px solid #4f6dee}
.fact.fw{border-left-color:#f59e0b}.fact.fg{border-left-color:#2bc96e}
.fact-title{font-size:12px;font-weight:500;color:var(--text-primary);margin-bottom:2px}
.fact-desc{font-size:11px;color:var(--text-secondary)}
.ic{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;margin-top:1px}
.icb{background:#eff6ff;color:#3b82f6}.icw{background:#fffbeb;color:#d97706}.icg{background:#f0fdf4;color:#16a34a}
.facts{display:flex;flex-direction:column;gap:7px}
</style>
